<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Su</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="logo">
        <span class="logo-icon">💕</span>
        <span class="logo-text">Su</span>
      </div>
      <div class="nav-items">
        <button class="nav-item active" data-tab="chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>对话</span>
        </button>
        <button class="nav-item" data-tab="knowledge">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>知识库</span>
        </button>
        <button class="nav-item" data-tab="profile">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span>TA的档案</span>
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main">
      <!-- Chat Tab -->
      <section class="tab-content active" id="tab-chat">
        <div class="chat-container">
          <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
              <div class="welcome-icon">💬</div>
              <h2>你好，我是 Su</h2>
              <p>告诉我你的困惑，我会基于你提供的信息给出建议。<br>记得先在"知识库"和"TA的档案"里录入信息哦～</p>
            </div>
          </div>
          <div class="chat-input-area">
            <button id="imageBtn" class="image-btn" title="发送图片">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <input type="file" id="chatImageInput" accept="image/*" hidden>
            <textarea id="chatInput" placeholder="说说你的困惑..." rows="1"></textarea>
            <button id="sendBtn" class="send-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- Knowledge Tab -->
      <section class="tab-content" id="tab-knowledge">
        <div class="knowledge-container">
          <div class="knowledge-header">
            <h2>知识库</h2>
            <div class="knowledge-actions">
              <button class="btn btn-primary" id="addKnowledgeBtn">+ 文字录入</button>
              <button class="btn btn-outline" id="addScreenshotBtn">📷 截图识别</button>
              <input type="file" id="screenshotInput" accept="image/*" hidden>
            </div>
          </div>
          <div class="filter-row">
            <button class="filter-chip active" data-category="all">全部</button>
            <button class="filter-chip" data-category="profile">基础信息</button>
            <button class="filter-chip" data-category="event">事件</button>
            <button class="filter-chip" data-category="chat">聊天</button>
            <button class="filter-chip" data-category="preference">偏好/雷区</button>
          </div>
          <div class="knowledge-list" id="knowledgeList"></div>
        </div>
      </section>

      <!-- Profile Tab -->
      <section class="tab-content" id="tab-profile">
        <div class="profile-container">
          <h2>TA的档案</h2>
          <form id="profileForm">
            <div class="form-group">
              <label>名字 / 昵称</label>
              <input type="text" id="profileName" placeholder="TA的名字">
            </div>
            <div class="form-group">
              <label>年龄</label>
              <input type="text" id="profileAge" placeholder="如：25">
            </div>
            <div class="form-group">
              <label>职业</label>
              <input type="text" id="profileOccupation" placeholder="如：设计师">
            </div>
            <div class="form-group">
              <label>兴趣爱好</label>
              <input type="text" id="profileHobbies" placeholder="如：看电影、画画、逛展">
            </div>
            <div class="form-group">
              <label>性格特点</label>
              <input type="text" id="profilePersonality" placeholder="如：内向、温柔、有点小傲娇">
            </div>
            <div class="form-group">
              <label>其他备注</label>
              <textarea id="profileNotes" placeholder="任何你想记录的信息" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">保存档案</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <!-- Add Knowledge Modal -->
  <div class="modal" id="addModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h3>添加知识</h3>
      <div class="form-group">
        <label>分类</label>
        <div class="category-select">
          <button type="button" class="filter-chip active" data-value="profile">基础信息</button>
          <button type="button" class="filter-chip" data-value="event">事件</button>
          <button type="button" class="filter-chip" data-value="chat">聊天</button>
          <button type="button" class="filter-chip" data-value="preference">偏好/雷区</button>
        </div>
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="modalContent" placeholder="输入信息内容..." rows="5"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalConfirm">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
